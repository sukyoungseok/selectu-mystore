            - heading "서일본은 완벽하게 즐기기 위한 가장 편리한 방법! 패스 세트 상품을 구매하고 합리적으로 여행해 보세요!" [level=2] [ref=e167]
            - generic [ref=e169]:
              - paragraph [ref=e172]:
                - text: "[이 티켓의 매력포인트!] • 서일본의 주요 관광 명소를 방문하는 패스를 구매하고 편하게 여행해 보세요! • 번들 상품으로 묶여 합리적으로 이용 가능한 상품입니다. • 아마노하시다테, 이네, 나리아리지 등 뛰어난 자연경관을 둘러보실 수 있습니다. 일본 교토부 북부에 위치한 미야즈시 미야즈만은 특수한 자연경관을 갖고 있습니다. 지각변동으로 인해 해상에 사주(砂州) 지형이 형성되어 일본에서는 단고의 아마노하시다테로 불리며, 아키의 미야지마(현재의 이쓰쿠시마), 무츠의 마쓰시마와 함께 \"일본 3경\"으로 불리기도 합니다. 아마노하시다테라는 지명은 사주의 북쪽 끝에 위치한 가사마쓰공원과 남쪽 끝에 위치한 히류칸의 2개 언덕에서 사주를 등지고 다리 사이로 머리를 숙여 뒤를 바라보면, 사주가 하늘을 향해 비스듬히 뻗는 것처럼 보이는 것에서 유래되었습니다. 몬쥬산에는 아마노하시다테를 내려다 볼 수 있는 전망대가 있으며, 산 위에는 관람차 및 남녀노소 즐길 수 있는 어트랙션이 있습니다. 그 곳에서 바라보는 아마노하시다테는 용이 하늘에서 춤추는 것처럼 보여 \"히류칸\"으로 불리며, 생생한 아마노하시다테의 경치를 볼 수 있습니다. 전망대에서는 리프트 또는 모노레일을 이용할 수 있습니다. 아마노하시다테 관광선 선착장은 아마노하시다테 몬쥬 지구(치온지, 아마노하시다테역)과 이치노미야 지구(모토이세코노신사, 가사마쓰공원)를 왕복하는 관광선 선착장입니다. 이 곳에서 자전거를 대여할 수도 있습니다. 이네에서 볼 수 있는 후나야는 1층은 배 정박 및 어구 수납, 건조장 등으로, 2층은 집으로 되어 있는 이네만 앞바다에 있는 독특한 건물입니다. 이네만에는 약 120여 채의 후나야, 130여채의 도죠집(土蔵屋)이 늘어져 있으며, 가장 오래된 것은 에도시대 후기에도 있었다고 합니다. 2005년, 이네 후나야구는 국가 중요 전통 건조물군 보존구로 지정되었습니다. 가사마쓰공원은 아마노하시다테를 내려다보는 전망대로 아마노하시다테의 비스듬한 일(一)자모양을 볼 수 있습니다. 마타노조키 자세(다리 사이로 고개를 숙이고 보는 것)로 아마노하시다테를 바라보면 마치 하늘에 걸친 다리처럼 보입니다. 가사마쓰공원에 오시면 \"가사마쓰\"라는 이름의 소나무와 \"마타노조키\"로 유명한 전망대를 추천 드립니다. 코노신사 옆의 케이블카역 \"후츄역\"에서 케이블카 및 리프트를 타면 가사마쓰공원에 도착합니다. 성상사(成相寺)행 버스도 가사마쓰공원에서 탑니다. 소원을 빌면 잘 이루어진다는 절로 유명한 \"나리아이지\"의 관람료와 아마노하시다테 가사마쓰공원에서 나리아이지까지 가는 등산 버스 왕복 승차권이 세트로 구성되어 있습니다. 나리아이지는 일본 유산에도 등록되어 있으며, 헤이세이 5층 탑은 특히 단풍과의 조화로운 모습으로 유명하며, 촬영지로도 유명합니다. 등산 버스는 가파른 능선을 타고 주행하여 차창으로 보이는 경치 또한 절경이며, 아마노하시다테의 숨은 명소 중 하나입니다. 해당 세트 상품의 스페셜 혜택으로는 '가와라케 던지기' 체험을 할 수 있는 가와라케(토기) 1개가 포함되어 있습니다. 가라와케 던지기 체험은 초벌구이된 토기를 던짐으로써 액운을 쫓는 풍습 중 하나입니다. 가라와케(토기)를 던짐으로써 액운을 없앨 수 있을 뿐만 아니라 던지는 곳에 설치된 '지혜의 고리'를 통과시키면 '소원이 이루어진다'고 합니다. 4가지 유형의 티켓이 포함된 상품입니다. ①Kyoto Tango Amanhashidate・Ine Sightseeing Pass 2-day ticket/교토 단고 아마노하시다테, 이네관광프리 2일권 • 미야즈시, 교탄고시, 이네쵸, 요사노쵸의 노선버스 (커뮤니티 버스 제외) ("
