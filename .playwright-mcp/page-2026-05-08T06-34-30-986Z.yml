              - paragraph [ref=e629]: ・현장 이동 시 승합차로 이동 예정이나 인원에 따라 차량이 변동될 수 있습니다. ・차량에 자리가 없을 수 있으니 캐리어 등 짐은 지참하지 마시고 호텔 등에 맡겨주세요. ・송영 시간은 전날 저녁에 연락드립니다. ・이시가키섬 남부 숙박 시설 한정 픽업&드랍 서비스 제공 (그 외 지역에 숙박하시는 분들은 이시가키항 낙도터미널 정문에서 집합입니다. ・시기나 당일 현장 상황에 따라 집합 및 해산 시간이 변경되거나 안전상 투어 진행이 어려울 경우, 투어가 취소될 수 있습니다. ・투어는 어느 정도 비가 와도 진행됩니다. ・만 2세 이하, 만 66세 이상의 분은 참가는 불가합니다. ・투어 특성상 체중 100kg 이상의 분은 참여하실 수 없습니다. ・삽입형 심장제세동기(ICD) 착용, 심장 질환, 호흡기 계통 질환(천식 등), 정신 질환(간질, 치매, 발달 장애, 공황 장애 등), 심혈관 계통 질환, 뇌혈관 계통 질환, 숙취, 당일 음주 등이 있는 분, 신체에 불편이 있는 분, 임산부는 참여하실 수 없습니다. 당일 파악 시 참여 불가 및 취소 불가합니다. ・미리 젖어도 되는 옷으로 갈아입고 참여해 주세요. ・화장실은 미리 이용하시고 참여해 주세요. (현지 근처에 화장실이 없습니다) ・온수 샤워는 이시가키항 낙도 터미널 주변에 있습니다. 원하실 경우 담당 가이드에게 요청해 주세요. ・선라이즈는 일출, 선셋은 일몰을 보는 플랜이나 날씨등으로 인해 불가할 수 있습니다. 그럴 경우 일반 맹그로브 투어로 진행됩니다. ・개별 여행자 보험 가입을 권장 드립니다. ・최소모객인원 미만 모객 시 투어가 취소될 수 있습니다. ・가이드의 지시에 잘 따라주시고 안전 장비를 착용해주세요.
