                - button "홍콩디즈니랜드" [ref=e559] [cursor=pointer]:
                  - generic [ref=e560]: 홍콩디즈니랜드
                - button "디즈니 테마 파크 – 오랜 시간 이어져 온 모두를 위한 즐거움 모든 연령의 가족과 친구들이 함께 모여 즐거운 시간을 보낼 수 있는 마법의 공간을 소개합니다. 월트디즈니사의 창업주인 월트 디즈니(Walt Disney)는 기존의 놀이동산보다 더 흥미로운 그 무언가를 꿈꾸었습니다. “우리 딸들이 아주 어렸을 때 토요일은 항상 ‘아빠의 날’이었어요. 난 아이들과 함께 회전목마를 타러 가거나 다른 장소들을 방문하곤 했지요. 아이들이 회전목마를 타는 동안 앉아 기다리면서 생각했어요. 부모와 아이들이 함께 즐길 수 있는 무언가를 세워야겠다고 말이죠. 이러한 생각이 진화를 거듭해서 지금 여러분이 보고 있는 디즈니랜드의 모습이 되었습니다. 이 모든 것은 두 명의 딸아이와 조그마한 즐거움이라도 함께 공유할 수 있는 장소로 가고 싶었던 아빠로부터 시작된 것이지요.” 디즈니 테마 파크는 행복과 순수함을 일깨우고 기억을 공유합니다. 특히 홍콩 디즈니랜드 리조트는 눈앞에 이국적인 박물관 유물이 펼쳐지는 미스틱 매너와 같은 몰입형 어트랙션, 현실과 다른 세상의 경험을 제공하는 판타지랜드 및 토이 스토리 랜드와 같은 테마 공간을 통해 새롭고 고유한 방식으로 전통을 이어가고 있습니다. 홍콩 디즈니랜드 리조트에서 살아 숨쉬고 있는 월트디즈니사의 유산은 없어서는 안 되는 중요한 가치입니다. 홍콩 디즈니랜드 리조트는 지구상의 다른 디즈니 호텔과는 달리 모든 연령대의 투숙객을 대상으로 다양하고 문화적으로 독특한 디즈니 경험을 제공하는 것에 자부심을 갖고 있습니다. 이 모든 것은 “부모와 자녀가 함께 즐길 수 있는 패밀리 파크”라는 월트의 아이디어에서 시작되었습니다. 이제 당신이 이 즐거움에 동참할 차례입니다!" [ref=e561] [cursor=pointer]:
