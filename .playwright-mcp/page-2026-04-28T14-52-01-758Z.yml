              - paragraph [ref=e1586]: 🚋 교통비 지불 수단 안내 • 신용카드 또는 트래블카드 (뒷면에 와이파이 문양이 있는 컨택리스 카드만 가능) • 홍콩 교통카드인 옥토퍼스 카드 구입 후 충전 (출국 전 잔액 환불) • 신용카드와 옥토퍼스카드는 한 개의 카드로 한 분만 결제 가능합니다 • 현금은 불편합니다 - 시내버스가 잔돈을 거슬러 주지 않습니다 - 스타페리 탑승권을 구입하기 위해 별도로 줄을 서야 해서 시간을 낭비하게 됩니다 • 대중교통 이용료는 1인당 약 15HK$ 입니다 • 대중교통은 스타페리 1회, 야시장 행 시내버스 1회 탑승합니다 📢 꼭 읽어주세요! • 투어 시간은 오후 5시부터 9시로 4시간 동안 진행됩니다. • 투어 출발 최소 인원은 4명입니다 • 1~3인 예약 고객님은 투어 최대 1일 전 오후까지 대기하실 수 있습니다 • 피크트램 패스트트랙 요금이 포함입니다. 따로 피크트램 티켓을 구입하지 마세요 • 투어일 기준으로 만 36개월 미만은 무료이고, 그 이후부터 성인 요금과 동일합니다 • 만 3세 미만 아동에게는 설명 수신기가 지급되지 않습니다 • 10명 미만인 경우 피크 하행 시 택시 또는 시내버스를 이용할 수 있습니다 • 현지 기상, 교통 등의 사정에 따라 여행 동선이 조정될 수 있습니다 • 고객님의 지각 등 개인 사정으로 인한 불참은 환불하지 않습니다 • 가이드 설명 수신기를 훼손 또는 파손 시 HK$400을 변상해야 합니다 • 든든한 가이드가 안내하지만 여행자 보험은 꼭 가입하시기 바랍니다 * 당일 예약의 경우에도 당일 취소는 불가합니다 👌 사용방법 • 4명이 구성되어 투어가 확정되면 마이리얼트립 메시지로 알려드립니다. • 홍콩대장의 알림톡 바우처는 투어 3~4일 전에 발송됩니다 • 가이드에게 알림톡을 보여주세요 • 구매하신 날에만 유효하지만, 투어일 이전에는 날짜 변경 가능하니 연락주세요.
