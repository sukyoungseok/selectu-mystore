                  - text: ⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯
                  - text: ✅ 제이나 보홀 헤난 리조트 알로나/타왈라 & 투어 상품 초특가 마켓
                  - text: "▪️공구 기간: 9/8(월) - 10/8(수)"
                  - text: ▪️여행 기간
                  - text: "🔸리조트 : 25년 10/25(토) - 26년 2/28(토)"
                  - text: "🔸투어 : 25년 9/10(수) - 26년 2/28(토)"
                  - text: ▪️판매 상품 및 가격
                  - text: "🔸5성급 보홀 헤난 리조트 알로나/타왈라 : 1박 20만 원대~ (날짜별 상이/ 전일정 조식 포함/ 리조트 디너 뷔페 1회 포함)"
                  - text: 🔸투어 상품
                  - text: "-마델린 나팔링(정어리떼 스노클링) : 1인 49,000원"
                  - text: "-발리카삭 호핑투어(돌고래 워칭, 바다거북 스노클링, 버진아일랜드 입도) : 1인 59,000원"
                  - text: "-체험 다이빙 : 1인 71,000원"
                  - text: "-노스젠 선셋 투어(디너 포함) : 1인 55,000원~"
                  - text: "-체크아웃 투어(데이) : 1인 89,000원~"
                  - text: "-체크아웃 투어(나이트) : 1인 109,000원~"
                  - text: "*이번 마켓은 리조트 및 투어 상품을 선택 구매할 수 있는 마켓입니다."
                  - text: (에어텔 상품 ❌, 항공권은 포함하지 않습니다)
                  - text: 🚫NO 옵션, NO 쇼핑, 모든 투어 픽드랍 포함
                  - text: "*마델린 나팔링의 경우 조인투어로 4인 미만 모객 시 투어가 취소될 수 있습니다."
                  - text: ⭐️ONLY 제이나 마켓 특전⭐️
                  - text: 1. 보홀 헤난 리조트 예약 시 투숙객 전원 리조트 디너 뷔페 1회 무료 제공 (인당 39,000원 상당)
                  - text: 2. 보홀 헤난 리조트 3박 이상 예약 시, 1박당 1만 원 할인 (예) 3박 시 3만 원 할인, 5박 시 5만 원 할인
                  - text: 3. 체크아웃 투어(데이/나이트) 예약 시, 1만 원 추가 할인 혜택 제공
                  - text: 4. 투어 상품 1개만 예약해도 보홀 라운지 입장권 증정 (18,900원 상당/ 단, 체크아웃 투어 제외)
                  - text: 5. 투어 상품 3개 이상 예약 시 0.5박 심플패키지 업그레이드 (39,000원 상당/ 단, 체크아웃 투어 제외)
                  - text: "*보홀 라운지: 팡라오 공항에서 차량 1분 거리 프리미엄 휴식 공간"
                  - text: "*보홀 라운지 입장권: 라운지 4시간 이용권"
                  - text: "*0.5박 심플패키지: 라운지 6시간 이용권+발 마사지 30분+라면 제공"
                  - text: ✨구매 인증 이벤트✨
                  - text: ▪️이벤트 참여 방법
                  - text: 리조트 상품 혹은 리조트+투어 상품 구매 후, 인스타그램 스토리에
