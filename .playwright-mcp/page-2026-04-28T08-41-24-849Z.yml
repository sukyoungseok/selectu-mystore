                  - text: "▪️이벤트 대상 : 리조트 혹은 리조트+투어 상품 구매자 전원 (투어 상품만 구매 시에는 참여가 불가합니다)"
                  - text: "▪️진행 기간 : 9/8(월)-10/8(수)"
