                - heading "📣익스프레스패스 티켓 오픈 공지" [level=3] [ref=e117]
                - paragraph [ref=e120]:
                  - text: 🚨2026년 5월 7일 ~ 5월 31일 기간 동안은 다이너소어 어트랙션 운행 중지로 인해 해리포터로 자동 지정되어 이용이 진행됩니다. 🤯 옵션이 많고 복잡한 익스프레스 패스 .. 👇🏻 나에게 딱 맞는 익스프레스는? 10초 만에 찾는 맞춤형 티켓 추천! 🪄
                  - link "https://myusjexpress-myrealtrip.lovable.app/" [ref=e121] [cursor=pointer]:
                    - /url: https://myusjexpress-myrealtrip.lovable.app/
                  - text: 🔹구매일 기준 2개월 뒤의 티켓 구매가 가능합니다. 🔹선택일자에 가능한 모든 옵션을 불러오는 데 평균 5초 정도 소요됩니다. 🔹여러 명이 방문 예정이라면 인원수만큼 한번에 구매해 주세요. 취소/환불 불가한 상품으로 개별 구매 시, 예약 변경이 어렵습니다. 한번에 구매가능한 최대 수량은 20매이며, 그 이상을 구매할 경우 예약이 취소될 수 있습니다. 🔹본 상품은 구매 즉시 확정이 되는 상품이나, 상황에 따라 예약 확정 및 바우처 확인까지 시간이 조금 더 소요될 수 있습니다. 🔹아동 이용 규정 - 만 3세 이하는 보호자의 익스프레스 패스로 같이 이용가능합니다. 보호자의 익스프레스 패스로 닌텐도 확약시간에 같이 입장가능합니다. - 다만 키 제한 등으로 이용하지 못하는 어트랙션이 많습니다. 아래 링크에서 신장 제한 규정을 살펴본 후 이용해주세요. (
                  - link "https://www.usj.co.jp/web/ko/kr/service-guide/safe/height-restriction" [ref=e122] [cursor=pointer]:
                    - /url: https://www.usj.co.jp/web/ko/kr/service-guide/safe/height-restriction
                  - text: ) TM & © Universal Studios. All rights reserved. 🚨2026년 3월 7일 ~ 3월 29일 죠스™가 점검을 진행합니다. 지금 유니버셜 스튜디오 재팬 구매하면 일본 eSIM 50% 즉시 할인! ✔️ eSIM 링크(
                  - link "https://www.myrealtrip.com/sim" [ref=e123] [cursor=pointer]:
