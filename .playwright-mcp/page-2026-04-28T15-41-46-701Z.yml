            - paragraph [ref=e180]: "[이 액티비티의 매력 포인트!] • 유리배를 타고 이시가키섬 카비라만을 방문해보세요! • 어린아이도 즐길 수 있는 캐주얼 해양 체험! • 옷을 갈아입거나 아무것도 가져갈 필요가 없습니다! 아무것도 가져오지 않고도 쉽게 참여할 수 있어요! 유리배를 타고 이시가키섬의 명승지인 카비라만(Kabira Bay)을 둘러보세요. 오키나와 이사가키섬의 \"카비라만\"을 글라스보트는 누구나 부담 없이 바닷속 산책을 즐길 수 있습니다. 주위 풍경은 물론 다양한 산호초와 형형색색의 열대어들을 관찰하며, 카비라만에서 바라보는 이시가키섬의 대자연을 한번 만나보세요. 어린아이도 부담없이 즐길 수 있는 해양 체험입니다. [옵션 안내] ⓐ 성인 (만 12세 이상) ⓑ 아동 (만 4-11세) [예약 전 확인해 주세요!] • 유아(만 3세 이하) 좌석이 제공되지 않습니다. 성인 1명당 유아 1명까지 무료이며, 유아 1명 이상인 경우에는 아동 요금이 적용됩니다. • 만 4~11세의 요금을 이용하는 경우, 나이를 증명할 수 있는 증빙 자료를 지참해 주세요. • 재입장은 불가합니다."
