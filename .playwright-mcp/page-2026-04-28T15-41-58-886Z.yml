            - paragraph [ref=e180]: "[이 티켓의 매력 포인트!] • 복잡한 도시를 떠나 조용한 힐링을 원한다면 나구라만이 내려다보이는 이시가키 야이마 마을에 방문해 보는 걸 추천해요. • 일본 남부에서 놓쳐서는 안 될 관광지인 야이마 마을은 주변의 환상적인 자연과 어우러진 잊지 못할 장관을 자랑합니다. • 귀여운 다람쥐원숭이를 만나볼 수 있는데요, 먹이를 주거나 함께 사진을 찍을 수도 있어요. 오키나와 이시가키섬의 전통문화와 자연을 함께 체험할 수 있는 민속 테마파크입니다. 이시가키섬의 명소인 나구라만이 한눈에 내려다보이는 언덕에 위치해 있으며, 풍요로운 자연 속에 옛 야에야마 지역의 전통 가옥들이 재현되어 있어 전통문화를 생생하게 느낄 수 있습니다. 더불어 맹그로브 숲 산책 및 다람쥐원숭이 등 귀여운 동물들과도 만나볼 수 있습니다. 야이마무라에는 60마리 이상의 다람쥐원숭이가 살고 있으며, 먹이주기 체험도 가능하여 가까이서 볼 수 있습니다! [예약 전 확인해 주세요!] • 만 2세 이하는 무료로 입장 가능합니다. • 만 12세의 경우 초등학생은 아동 요금, 중학생은 성인 요금으로 구매해 주세요."
