                  - generic [ref=e4528]: 3달 전
                - generic [ref=e4530]: The room was very clean and the ladies were very attentive to our needs. We were impressed with our concierge Raymond Woo who listed to our needs for excursions on our own. We wanted to take in Hong Kong with local transportation such as the metro and Ferry. He gave us the exact routes to Victoria peak and we were able to view the beautiful sunset. We had lunch at the restaurant he recommended and it was very tasty with excellent service. We loved it so much that we returned the next evening to try Korean barbecue…again so delicious and delightful. Raymond gave us helpful tips such as where to view the light show in the evening and where to buy luggage. The following morning we wanted to go to Church and also to view the Buddha. So he directed us to the the bus system, subway, and the tram. Coming down from the tram, we had a beautiful view of the full moon on the horizon. It was truly spectacular. The instructions Raymond provided were exact and the journey was seamless. Raymond provided outstanding service with respect and kindness. We are so grateful to him for assisting us to have an incredible experience in Hong Kong.
