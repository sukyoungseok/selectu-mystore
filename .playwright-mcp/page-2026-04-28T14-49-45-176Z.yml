                - generic [ref=e4404]: The room is spacious by HK standards. We had a big area to walk about in the room and put our luggages. The staff were really friendly and made our stay wonderful. They even helped us get a bigger 4-seater taxi on the day we checked out as we had 7 luggages. We took one taxi directly to airport which made the journey easier and more economical (vs 2 taxis or to transfer to Airport Express line). Depending on whether you can walk, the only possibly a con wasthat we have to walk about 5 to 7min to the nearest MRT station at TST East Station (which was ok for me, but my group has young children and elderly). The toilet comes with Japanese style bidet which was so comfortable especially in the cold weather( the toilet bowl was heated). Overall, very nice and comfortable hotel. Highly recommended.
