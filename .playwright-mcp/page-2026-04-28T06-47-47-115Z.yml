              - link "파파트래블(PAPATRAVEL) • 4개월 전 구독자 여러분들 안녕하세요 ^^ 오늘은 여행 이야기보다 조금 더 사람 이야기로 인사드리고 싶어요 파파트래블을 운영하면서 자주 생각합니다 이 채널은 단순히 “어디가 좋다”를 알려주는 공간이 아니라 하루의 끝에서 잠시 쉬어갈 수 있는 \"작은 여행 사랑방\" 같은 곳이 되기를요 바쁜 하루를 마치고 “오늘은 어디 좀 다녀와볼까” 하며 이 채널을 찾아주신 분들!! 오늘만큼은 꼭 전하고 싶은 말이 있습니다 여러분 덕분에 이 채널이 숨 쉬고, 여러분 덕분에 제가 또 한 번의 여행을 떠날 수 있었습니다 정말 감사합니다 ^^ 여행은 어디를 가느냐보다 누구와, 어떤 마음으로 떠나느냐가 더 중요하다고 생각합니다 그래서 파파트래블은 앞으로도 가장 비싼 여행보다 가장 따뜻한 여행, 가장 편안한 여행, 그리고 가족과 함께 떠나고 싶은 여행을 계속해서 소개해 드리도록 하겠습니다 오늘 밤, 조금 늦은 시간이라도 따뜻한 차 한 잔 마시면서 올 한 해 정말 잘 버텨낸 나 자신에게 작은 박수 한 번 보내주세요 파파트래블은 언제나 구독자 여러분들이 쉬어갈 여행 사랑방으로 남겠습니다 🎄 메리 크리스마스 그리고 진심으로 감사합니다 — 파파트래블 드림 나와 사용자 142명이 이 게시물을 좋아함 tooltip 좋아요 142개 이 게시물에 싫어요 표시 tooltip 공유 tooltip 댓글 33개 tooltip" [ref=e2542] [cursor=pointer]:
